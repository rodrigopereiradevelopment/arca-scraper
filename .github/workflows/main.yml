name: CI Arca Scraper

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 3 * * 1'  # Toda segunda-feira às 00:00 BRT
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 360  # 6 horas (limite máximo)

    steps:
    - name: Checkout do Código
      uses: actions/checkout@v4

    - name: Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Instalar dependências
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Executar Pipeline ARCA
      env:
        MONGO_URI: ${{ secrets.MONGO_URI }}
        IMPERIAL_TOKEN: ${{ secrets.IMPERIAL_TOKEN }}
        API_AUTHORIZATION_TOKEN: ${{ secrets.PONTO_NOVO_TOKEN }}
      run: |
        python main.py

    - name: Pipeline Concluído
      run: echo "✅ Coleta e análise concluídas com sucesso!"