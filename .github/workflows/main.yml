name: CI Arca Scraper

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout do Código
      uses: actions/checkout@v4

    - name: Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Instalar dependências de teste
      run: |
        python -m pip install --upgrade pip
        pip install flake8 requests pymongo

    - name: Verificar erros de sintaxe (Lint)
      run: |
        # Para o robô parar se encontrar erros críticos (SyntaxError)
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        
    - name: Verificar estilo e complexidade
      run: |
        # Avisa sobre estilo, mas não "quebra" o build (exit-zero)
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    - name: Finalizado
      run: echo "✅ Análise de código concluída!"
