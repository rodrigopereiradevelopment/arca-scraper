name: CI Arca Scraper

on:
  schedule:
    - cron: '0 3 * * 1,4'  # Segunda e Quinta 00:00 BRT
  workflow_dispatch:

jobs:
  # JOB 1: Scraping paralelo (6 mercados)
  scraping:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        mercado: [atacadao, sao_vicente, pague_menos, ponto_novo, imperial, goodbom]

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Scraper
      env:
        MONGO_URI: ${{ secrets.MONGO_URI }}
        IMPERIAL_TOKEN: ${{ secrets.IMPERIAL_TOKEN }}
        API_AUTHORIZATION_TOKEN: ${{ secrets.API_AUTHORIZATION_TOKEN }}
      run: |
        python main.py --mercado ${{ matrix.mercado }}

  # JOB 2: Sync paralelo (cada mercado sync separado!)
  sync_supabase:
    runs-on: ubuntu-latest
    needs: scraping
    if: always()
    strategy:
      fail-fast: false
      matrix:
        mercado: [atacadao, sao_vicente, pague_menos, ponto_novo, imperial, goodbom]

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Sync Mercado
      env:
        MONGO_URI: ${{ secrets.MONGO_URI }}
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
      run: |
        python scripts/sync_mercado.py --mercado ${{ matrix.mercado }}